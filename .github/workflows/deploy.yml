name: deploy storybook after release

on:
  push:
    tags:
      - 'v*' # only runs on version tags

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: install deps
        run: npm install

      - name: build storybook
        run: npm run build-storybook

      - name: Deploy to Vercel
        run: npx vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }} --yes --scope=${{ secrets.VERCEL_ORG_ID }}
